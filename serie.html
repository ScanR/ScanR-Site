<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>ScanR – Fiche série</title>
    <!-- Police + icônes + style global -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-…" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- === Header identique à index.html (copié tel quel) ==================== -->
    <header>
      <div class="header-container">
        <div class="logo">
          <a
            href="index.html"
          >
            <img src="img/scanr.webp" alt="ScanR Logo" />
          </a>
        </div>

        <nav>
          <ul>
            <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
          </ul>
        </nav>

        <div class="header-actions">
          <div class="header-search">
            <button
              id="header-search-toggle"
              class="search-toggle"
              type="button"
              aria-label="Rechercher une série"
              aria-expanded="false"
              aria-controls="header-search-panel"
            >
              <i class="fas fa-search"></i>
            </button>
            <div id="header-search-panel" class="search-panel" hidden>
              <form class="search-form" role="search">
                <label class="sr-only" for="header-search-input">
                  Rechercher une série
                </label>
                <input
                  id="header-search-input"
                  type="search"
                  placeholder="Rechercher une série, un auteur, un tag..."
                  autocomplete="off"
                />
                <button type="submit">Chercher</button>
              </form>
              <p class="search-results-meta" aria-live="polite">
                Commencez à taper pour rechercher une série.
              </p>
              <div class="search-results"></div>
            </div>
          </div>
          <div class="social-icons">
            <a href="https://www.youtube.com/channel/UCCaNnBazWhyzwKpgFUGTE7g" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.com/invite/Pdmfmqk" target="_blank" rel="noopener noreferrer" aria-label="Discord"><i class="fab fa-discord"></i></a>
            <a href="https://x.com/TeamScanR" target="_blank" rel="noopener noreferrer" aria-label="X"><i class="fab fa-twitter"></i></a>
          </div>
          <button id="theme-toggle" class="theme-toggle" aria-label="Changer de thème"><i class="fas fa-moon"></i></button>
        </div>
      </div>
    </header>
    <!-- ====================================================================== -->

    <main id="serie-page" class="serie-page">
      <!-- Le contenu est injecté par serie.js -->
    </main>

    <script src="header-search.js" type="module"></script>
    <script src="serie.js" type="module"></script>
  </body>
</html>
